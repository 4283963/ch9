server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: shuttle-rack-system

  profiles:
    active: dev

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shuttle_rack?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  websocket:
    broadcast:
      enabled: true

shuttle:
  rack:
    rows: 5
    cols: 8
    layers: 3
  simulation:
    enabled: true
    interval-ms: 500

logging:
  level:
    com.shuttle.rack: DEBUG
    org.springframework.web.socket: DEBUG
